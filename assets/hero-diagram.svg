<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Your App -->
  <rect x="20" y="70" width="160" height="60" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="100" y="95" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Your App / IDE</text>
  <text x="100" y="115" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Claude Code · Codex · SDK</text>
  
  <!-- Arrow 1 -->
  <line x1="180" y1="100" x2="260" y2="100" stroke="#64748b" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="258,95 268,100 258,105" fill="#64748b"/>
  <text x="220" y="88" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">tex-key</text>
  
  <!-- TexAPI Gateway -->
  <rect x="270" y="55" width="220" height="90" rx="14" fill="url(#grad1)" opacity="0.95"/>
  <text x="380" y="85" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">TexAPI Gateway</text>
  <text x="380" y="105" text-anchor="middle" fill="#e0e7ff" font-family="system-ui, -apple-system, sans-serif" font-size="10">Auth → Rate Limit → Credit → Route</text>
  <text x="380" y="125" text-anchor="middle" fill="#c7d2fe" font-family="system-ui, -apple-system, sans-serif" font-size="9">texapi.dev/v1</text>
  
  <!-- Arrow 2 -->
  <line x1="490" y1="100" x2="560" y2="70" stroke="#64748b" stroke-width="1.5"/>
  <line x1="490" y1="100" x2="560" y2="100" stroke="#64748b" stroke-width="1.5"/>
  <line x1="490" y1="100" x2="560" y2="130" stroke="#64748b" stroke-width="1.5"/>
  
  <!-- Claude -->
  <rect x="565" y="45" width="120" height="40" rx="8" fill="#1e293b" stroke="#d97706" stroke-width="1.5"/>
  <text x="625" y="70" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Claude</text>
  
  <!-- GPT -->
  <rect x="565" y="90" width="120" height="40" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="625" y="115" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="12" font-weight="600">GPT</text>
  
  <!-- Gemini -->
  <rect x="565" y="135" width="120" height="40" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="625" y="160" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Gemini</text>
  
  <!-- Savings badge -->
  <rect x="710" y="80" width="80" height="36" rx="18" fill="url(#grad2)"/>
  <text x="750" y="103" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700">-50%</text>
</svg>
